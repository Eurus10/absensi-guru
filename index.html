<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Presensi Ultimate v2.2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --danger: #ef4444; }
        
        /* Background Bergerak */
        body { 
            margin: 0; min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex; align-items: center; justify-content: center;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .app-shell { 
            width: 100%; max-width: 430px; height: 90vh; background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); border-radius: 30px; overflow-y: auto; position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.3);
        }

        /* Banner & Header */
        .school-banner { padding: 25px; text-align: center; background: white; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .school-logo { width: 65px; height: 65px; border-radius: 15px; object-fit: contain; margin-bottom: 8px; }
        
        /* Camera Section */
        .camera-container { margin: 20px; border-radius: 25px; overflow: hidden; height: 240px; border: 5px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); position: relative; }
        #video { width: 100%; height: 100%; object-fit: cover; }

        /* Buttons */
        .btn-action { border-radius: 18px; padding: 18px; font-weight: 700; border: none; color: white; margin-bottom: 12px; transition: 0.3s; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
        .btn-action:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-masuk { background: linear-gradient(to right, #10b981, #059669); }
        .btn-pulang { background: linear-gradient(to right, #ef4444, #dc2626); }
        .btn-izin { background: linear-gradient(to right, #f59e0b, #d97706); }

        /* Status Badges di Profil */
        .history-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; border-left: 6px solid #ddd; transition: 0.3s; }
        .border-tepat { border-left-color: var(--success) !important; }
        .border-telat { border-left-color: var(--danger) !important; }
        
        #login-screen, #setup-account-screen, #main-app, #admin-panel, #profile-page { display: none; }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="school-banner" class="school-banner">
        <img id="logo-img" src="https://via.placeholder.com/70" class="school-logo">
        <h6 id="school-name" class="fw-bold m-0 text-primary">E-PRESENSI</h6>
    </div>

    <div id="login-screen" class="p-4 text-center">
        <div class="my-4"><i class="fas fa-user-circle fa-4xl text-primary" style="font-size: 5rem;"></i></div>
        <h4 class="fw-bold mb-4">Selamat Datang</h4>
        <input type="text" id="username" class="form-control mb-3 p-3 rounded-pill" placeholder="Username">
        <input type="password" id="password" class="form-control mb-4 p-3 rounded-pill" placeholder="Password">
        <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold" onclick="handleLogin()">MASUK SISTEM</button>
    </div>

    <div id="main-app">
        <div class="p-4 d-flex justify-content-between align-items-center">
            <div><small class="text-muted">Guru Aktif:</small><h5 class="fw-bold m-0" id="user-display">Nama Guru</h5></div>
            <img id="mini-avatar" src="" style="width:55px; height:55px; border-radius:50%; border:3px solid white; cursor:pointer" onclick="showProfile()">
        </div>
        <div class="camera-container"><video id="video" autoplay playsinline></video></div>
        <div class="px-4 text-center">
            <h1 id="clock" class="fw-bold mb-0">00:00:00</h1>
            <p id="date" class="text-muted small mb-4"></p>
            <button class="btn-action btn-masuk" onclick="takeAbsen('Masuk')"><i class="fas fa-sign-in-alt me-2"></i> Absen Masuk</button>
            <button class="btn-action btn-pulang" onclick="takeAbsen('Pulang')"><i class="fas fa-sign-out-alt me-2"></i> Absen Pulang</button>
            <button class="btn-action btn-izin" onclick="handleIzin()"><i class="fas fa-envelope-open-text me-2"></i> Izin / Sakit</button>
        </div>
    </div>

    <div id="profile-page" class="p-4">
        <div class="text-center">
            <button class="btn btn-sm btn-light rounded-circle float-start" onclick="showScreen('main-app')"><i class="fas fa-arrow-left"></i></button>
            <img id="profile-avatar" src="" style="width:100px; height:100px; border-radius:50%; border:4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
            <h5 id="profile-name" class="fw-bold mt-3 mb-0">-</h5>
            <p id="profile-nip" class="text-muted small">NIP: -</p>
            <div class="badge bg-primary px-3 py-2 rounded-pill mb-4" id="profile-jabatan">-</div>
        </div>
        <h6 class="fw-bold mb-3"><i class="fas fa-calendar-check me-2"></i>Riwayat Kehadiran</h6>
        <div id="history-list" style="padding-bottom: 50px;"></div>
        <button class="btn btn-outline-danger w-100 rounded-pill mb-4" onclick="location.reload()">LOGOUT</button>
    </div>

    <div id="setup-account-screen" class="p-4 text-center">
        <h4 class="fw-bold mb-4">Aktivasi Akun Baru</h4>
        <input type="text" id="new-user" class="form-control mb-3" placeholder="Username">
        <input type="password" id="new-pass" class="form-control mb-4" placeholder="Password">
        <button class="btn btn-success w-100 py-3 rounded-pill" onclick="registerUser()">AKTIFKAN SEKARANG</button>
    </div>

    <div id="admin-panel" class="p-4">
        <div class="bg-dark text-white p-3 rounded-4 mb-4 text-center">
            <h5 class="m-0"><i class="fas fa-shield-alt me-2"></i>ADMIN PANEL</h5>
        </div>
        <div class="card p-3 border-0 shadow-sm rounded-4 mb-3">
            <label class="small fw-bold mb-2">Nama Sekolah</label>
            <input type="text" id="admin-school-name" class="form-control mb-3 rounded-3">
            <label class="small fw-bold mb-2">Logo Sekolah</label>
            <input type="file" id="admin-school-logo" class="form-control mb-3 rounded-3" accept="image/*">
            <button class="btn btn-primary w-100 rounded-pill" onclick="updateSchool()">SIMPAN PERUBAHAN</button>
        </div>
        <button class="btn btn-success w-100 py-3 rounded-pill mb-3" onclick="exportData()">DOWNLOAD LAPORAN EXCEL</button>
        <button class="btn btn-link text-danger w-100" onclick="location.reload()">Keluar Admin</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const SUPABASE_URL = 'https://dddbjqnoovjbdesvaulo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkZGJqcW5vb3ZqYmRlc3ZhdWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDAzMTUsImV4cCI6MjA5MDYxNjMxNX0.yLeBX4C8bwpCngvOViMR-eocHVFjv0BXXBuPJWwb9KU';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = "";
let schoolLogoBase64 = "";

window.onload = () => {
    updateClock();
    setInterval(updateClock, 1000);
    loadSchoolData();
    showScreen('login-screen');
};

function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID');
    document.getElementById('date').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
}

async function loadSchoolData() {
    const { data } = await _supabase.from('pengaturan').select('*').eq('id', 1).single();
    if(data) {
        document.getElementById('logo-img').src = data.logo_url || 'https://via.placeholder.com/70';
        document.getElementById('school-name').innerText = data.nama_sekolah || 'E-PRESENSI';
    }
}

function showScreen(id) {
    ['login-screen', 'setup-account-screen', 'main-app', 'admin-panel', 'profile-page'].forEach(s => {
        document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
    });
}

async function handleLogin() {
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;

    if(u === "admin" && p === "admin123") return showScreen('admin-panel');

    const { data } = await _supabase.from('profil_guru').select('*').eq('username', u).eq('password', p).single();
    if(data) {
        currentUser = u;
        document.getElementById('user-display').innerText = data.nama_lengkap;
        document.getElementById('mini-avatar').src = data.foto_avatar || `https://ui-avatars.com/api/?name=${data.nama_lengkap}`;
        showScreen('main-app');
        startCamera();
    } else if (u === "guru" && p === "123") {
        showScreen('setup-account-screen');
    } else alert("Login Gagal!");
}

function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
    .then(s => document.getElementById('video').srcObject = s);
}

async function takeAbsen(tipe) {
    const now = new Date();
    const jam = now.getHours();
    const menit = now.getMinutes();

    navigator.geolocation.getCurrentPosition(async (pos) => {
        const canvas = document.getElementById('canvas');
        canvas.width = 400; canvas.height = 400;
        canvas.getContext('2d').drawImage(document.getElementById('video'), 0, 0, 400, 400);
        
        let status = (tipe === 'Masuk' && (jam > 7 || (jam === 7 && menit > 0))) ? "Terlambat" : "Tepat Waktu";
        
        await _supabase.from('presensi').insert([{
            nama_guru: currentUser, tipe: tipe, keterangan: status,
            foto: canvas.toDataURL('image/webp', 0.5)
        }]);
        alert("Absen Berhasil: " + status);
    });
}

async function showProfile() {
    showScreen('profile-page');
    const { data: user } = await _supabase.from('profil_guru').select('*').eq('username', currentUser).single();
    document.getElementById('profile-name').innerText = user.nama_lengkap;
    document.getElementById('profile-nip').innerText = "NIP: " + (user.nip || "-");
    document.getElementById('profile-jabatan').innerText = user.jabatan || "Guru Mapel";
    document.getElementById('profile-avatar').src = user.foto_avatar || `https://ui-avatars.com/api/?name=${user.nama_lengkap}`;

    const { data: list } = await _supabase.from('presensi').select('*').eq('nama_guru', currentUser).order('created_at', {ascending:false});
    
    document.getElementById('history-list').innerHTML = list.map(i => {
        const isTelat = i.keterangan === "Terlambat";
        return `
            <div class="history-card ${isTelat ? 'border-telat' : 'border-tepat'} shadow-sm">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <b class="${isTelat ? 'text-danger':'text-success'}">${i.tipe}</b><br>
                        <small class="text-muted">${new Date(i.created_at).toLocaleString('id-ID')}</small>
                    </div>
                    <span class="badge ${isTelat ? 'bg-danger':'bg-success'} rounded-pill">${i.keterangan || 'Hadir'}</span>
                </div>
            </div>
        `;
    }).join('');
}

// Admin Logic Upload
document.getElementById('admin-school-logo').onchange = (e) => {
    const r = new FileReader(); r.onload = (ev) => schoolLogoBase64 = ev.target.result;
    r.readAsDataURL(e.target.files[0]);
};

async function updateSchool() {
    const payload = { id: 1, nama_sekolah: document.getElementById('admin-school-name').value };
    if(schoolLogoBase64) payload.logo_url = schoolLogoBase64;
    await _supabase.from('pengaturan').upsert(payload);
    alert("Data Terupdate!"); location.reload();
}

async function exportData() {
    const { data } = await _supabase.from('presensi').select('nama_guru, tipe, keterangan, created_at');
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Laporan");
    XLSX.writeFile(wb, "Rekap_Absen.xlsx");
}

function handleIzin() {
    // Logika Izin sama dengan v2.1
    alert("Gunakan menu upload bukti!");
}
</script>
</body>
</html>
