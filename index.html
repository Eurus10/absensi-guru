<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Presensi Guru v2.5</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --danger: #ef4444; }
        body { margin: 0; min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(-45deg, #6366f1, #a855f7, #ec4899); background-size: 400% 400%; animation: gradientBG 10s ease infinite; display: flex; align-items: center; justify-content: center; overscroll-behavior: none; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .app-shell { width: 100%; max-width: 430px; height: 92vh; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-radius: 35px; overflow-y: auto; position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .school-banner { padding: 20px; text-align: center; background: white; border-radius: 0 0 30px 30px; border-bottom: 2px solid #f0f0f0; }
        .school-logo { width: 60px; height: 60px; border-radius: 15px; object-fit: cover; margin-bottom: 5px; }
        
        .camera-container { margin: 15px; border-radius: 25px; overflow: hidden; height: 220px; border: 4px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-action { border-radius: 20px; padding: 18px; font-weight: 800; border: none; color: white; margin-bottom: 15px; width: 100%; transition: 0.3s; }
        .btn-masuk { background: linear-gradient(135deg, #10b981, #059669); }
        .btn-pulang { background: linear-gradient(135deg, #ef4444, #dc2626); }
        
        /* Style untuk tombol yang sudah diklik/nonaktif */
        .btn-disabled { background: #cbd5e1 !important; color: #64748b !important; cursor: not-allowed; transform: scale(0.98); opacity: 0.8; }
        
        #login-screen, #register-screen, #main-app, #admin-panel, #profile-page { display: none; padding: 20px; }
        
        .live-card { background: white; border-radius: 15px; padding: 12px; margin-bottom: 10px; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="school-banner">
        <img id="logo-img" src="" class="school-logo">
        <h6 id="school-name" class="fw-bold m-0" style="color: var(--primary);">MEMUAT...</h6>
    </div>

    <div id="login-screen" class="text-center">
        <div class="mt-5 mb-4 text-primary"><i class="fas fa-fingerprint" style="font-size: 4rem;"></i></div>
        <h4 class="fw-bold mb-4">E-Presensi</h4>
        <input type="text" id="login-user" class="form-control mb-3 p-3 rounded-pill border-0 shadow-sm" placeholder="Username">
        <input type="password" id="login-pass" class="form-control mb-4 p-3 rounded-pill border-0 shadow-sm" placeholder="Password">
        <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold mb-3" onclick="handleLogin()">MASUK</button>
        <p class="small">Guru baru? <a href="javascript:void(0)" onclick="showScreen('register-screen')">Daftar Akun</a></p>
    </div>

    <div id="register-screen">
        <h4 class="fw-bold mb-4 text-center">Daftar Akun Guru</h4>
        <input type="text" id="reg-nama" class="form-control mb-3 p-3 rounded-4" placeholder="Nama Lengkap">
        <input type="text" id="reg-user" class="form-control mb-3 p-3 rounded-4" placeholder="Username Baru">
        <input type="password" id="reg-pass" class="form-control mb-4 p-3 rounded-4" placeholder="Password Baru">
        <button class="btn btn-dark w-100 py-3 rounded-pill fw-bold mb-3" onclick="handleRegister()">BUAT AKUN</button>
        <button class="btn btn-link w-100 small text-muted" onclick="showScreen('login-screen')">Batal / Kembali</button>
    </div>

    <div id="main-app">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div><small class="text-muted">Guru:</small><h6 class="fw-bold m-0" id="user-display">-</h6></div>
            <img id="mini-avatar" src="" style="width:50px; height:50px; border-radius:50%; border:2px solid white; object-fit:cover; cursor:pointer" onclick="showProfile()">
        </div>
        <div class="camera-container"><video id="video" autoplay playsinline></video></div>
        <div class="text-center">
            <h2 id="clock" class="fw-bold mb-0">00:00</h2>
            <p id="date" class="text-muted small mb-3"></p>
            
            <button id="btn-masuk" class="btn-action btn-masuk shadow-lg" onclick="takeAbsen('Masuk')">ABSEN MASUK</button>
            <button id="btn-pulang" class="btn-action btn-pulang shadow-lg" onclick="takeAbsen('Pulang')">ABSEN PULANG</button>
            <p id="absen-status-msg" class="small text-success fw-bold"></p>
        </div>
    </div>

    <div id="admin-panel">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold m-0">Live Absensi</h5>
            <button class="btn btn-sm btn-success rounded-pill" onclick="exportData()">Excel</button>
        </div>
        <div id="live-list" style="max-height: 400px; overflow-y: auto;">
            </div>
        <button class="btn btn-link w-100 mt-3 text-danger" onclick="location.reload()">Keluar Admin</button>
    </div>

    <div id="profile-page">
        <button class="btn btn-light rounded-pill btn-sm mb-3" onclick="showScreen('main-app')"><i class="fas fa-arrow-left"></i> Kembali</button>
        <div id="history-list"></div>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const SUPABASE_URL = 'https://dddbjqnoovjbdesvaulo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkZGJqcW5vb3ZqYmRlc3ZhdWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDAzMTUsImV4cCI6MjA5MDYxNjMxNX0.yLeBX4C8bwpCngvOViMR-eocHVFjv0BXXBuPJWwb9KU';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const SCHOOL_LAT = -6.250736361618612;
const SCHOOL_LON = 106.46656879999998;
const MAX_DISTANCE = 50; 

let currentUser = "";

window.onload = () => { 
    updateClock(); setInterval(updateClock, 1000); 
    loadSchoolData(); 
    showScreen('login-screen'); 
};

function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('date').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long'});
}

function showScreen(id) {
    ['login-screen', 'register-screen', 'main-app', 'admin-panel', 'profile-page'].forEach(s => {
        document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
    });
}

// 1. FUNGSI REGISTRASI GURU BARU
async function handleRegister() {
    const nama = document.getElementById('reg-nama').value;
    const user = document.getElementById('reg-user').value;
    const pass = document.getElementById('reg-pass').value;

    if(!nama || !user || !pass) return alert("Lengkapi semua bidang!");

    const { error } = await _supabase.from('profil_guru').insert([{
        username: user, password: pass, nama_lengkap: nama
    }]);

    if(!error) {
        alert("Pendaftaran Berhasil! Silahkan Login.");
        showScreen('login-screen');
    } else {
        alert("Gagal daftar: Username mungkin sudah ada.");
    }
}

// 2. FUNGSI LOGIN & CEK STATUS TOMBOL
async function handleLogin() {
    const u = document.getElementById('login-user').value;
    const p = document.getElementById('login-pass').value;

    if(u === "admin" && p === "admin123") {
        showScreen('admin-panel');
        loadLiveAdmin();
        return;
    }

    const { data, error } = await _supabase.from('profil_guru').select('*').eq('username', u).eq('password', p).single();
    
    if(data) {
        currentUser = u;
        document.getElementById('user-display').innerText = data.nama_lengkap;
        document.getElementById('mini-avatar').src = `https://ui-avatars.com/api/?name=${data.nama_lengkap}&background=6366f1&color=fff`;
        showScreen('main-app');
        startCamera();
        checkTodayPresence(); // Langsung cek apakah sudah absen hari ini
    } else {
        alert("Username atau Password Salah!");
    }
}

// 3. FUNGSI LOCK TOMBOL (MAX 1X KLIK PER HARI)
async function checkTodayPresence() {
    const today = new Date().toISOString().split('T')[0]; // Format YYYY-MM-DD
    
    const { data } = await _supabase.from('presensi')
        .select('tipe')
        .eq('nama_guru', currentUser)
        .gte('created_at', today);

    const hasMasuk = data.some(d => d.tipe === 'Masuk');
    const hasPulang = data.some(d => d.tipe === 'Pulang');

    if(hasMasuk) {
        const btnM = document.getElementById('btn-masuk');
        btnM.classList.add('btn-disabled');
        btnM.onclick = null;
        btnM.innerText = "SUDAH ABSEN MASUK";
    }
    if(hasPulang) {
        const btnP = document.getElementById('btn-pulang');
        btnP.classList.add('btn-disabled');
        btnP.onclick = null;
        btnP.innerText = "SUDAH ABSEN PULANG";
    }
}

// 4. MONITOR REALTIME ADMIN
async function loadLiveAdmin() {
    const today = new Date().toISOString().split('T')[0];
    const { data } = await _supabase.from('presensi')
        .select('*')
        .gte('created_at', today)
        .order('created_at', {ascending: false});

    const container = document.getElementById('live-list');
    if(!data || data.length === 0) {
        container.innerHTML = "<p class='text-center small text-muted'>Belum ada absen masuk hari ini.</p>";
    } else {
        container.innerHTML = data.map(h => `
            <div class="live-card">
                <div class="d-flex justify-content-between">
                    <b>${h.nama_guru}</b>
                    <span class="badge ${h.tipe === 'Masuk' ? 'bg-success' : 'bg-danger'}">${h.tipe}</span>
                </div>
                <small class="text-muted">${new Date(h.created_at).toLocaleTimeString()} - ${h.keterangan}</small>
            </div>
        `).join('');
    }
}

// LOGIKA ABSEN (DENGAN JARAK)
async function takeAbsen(tipe) {
    navigator.geolocation.getCurrentPosition(async (pos) => {
        const userLat = pos.coords.latitude;
        const userLon = pos.coords.longitude;
        
        // Hitung Jarak
        const R = 6371e3;
        const dLat = (SCHOOL_LAT - userLat) * Math.PI/180;
        const dLon = (SCHOOL_LON - userLon) * Math.PI/180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(userLat*Math.PI/180) * Math.cos(SCHOOL_LAT*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const jarak = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

        if (jarak > MAX_DISTANCE) {
            alert(`JARAK TERLALU JAUH!\nAnda berada ${Math.round(jarak)}m dari sekolah.\nBatas: ${MAX_DISTANCE}m.`);
            return;
        }

        const canvas = document.getElementById('canvas');
        canvas.width = 400; canvas.height = 400;
        canvas.getContext('2d').drawImage(document.getElementById('video'), 0, 0, 400, 400);
        
        const jam = new Date().getHours();
        const menit = new Date().getMinutes();
        const status = (tipe === 'Masuk' && (jam > 7 || (jam === 7 && menit > 0))) ? "Terlambat" : "Tepat Waktu";

        const { error } = await _supabase.from('presensi').insert([{
            nama_guru: currentUser, tipe: tipe, keterangan: status,
            foto: canvas.toDataURL('image/webp', 0.5),
            latitude: userLat, longitude: userLon
        }]);

        if(!error) {
            alert("Absen Berhasil Dicatat!");
            checkTodayPresence(); // Kunci tombol setelah berhasil
        }
    }, (err) => alert("Harap aktifkan GPS!"));
}

async function loadSchoolData() {
    const { data } = await _supabase.from('pengaturan').select('*').eq('id', 1).single();
    if(data) {
        document.getElementById('logo-img').src = data.logo_url || 'https://via.placeholder.com/80';
        document.getElementById('school-name').innerText = data.nama_sekolah || 'E-PRESENSI';
    }
}

function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => document.getElementById('video').srcObject = s);
}

async function exportData() {
    const { data } = await _supabase.from('presensi').select('*').order('created_at', {ascending: false});
    const ws = XLSX.utils.json_to_sheet(data.map(i => ({
        'Nama': i.nama_guru, 'Tanggal': new Date(i.created_at).toLocaleDateString(), 
        'Jam': new Date(i.created_at).toLocaleTimeString(), 'Tipe': i.tipe, 'Status': i.keterangan
    })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Rekap");
    XLSX.writeFile(wb, "Rekap_Presensi_v2.5.xlsx");
}

async function showProfile() {
    showScreen('profile-page');
    const { data: hist } = await _supabase.from('presensi').select('*').eq('nama_guru', currentUser).order('created_at', {ascending:false}).limit(10);
    document.getElementById('history-list').innerHTML = hist.map(h => `
        <div class="history-card shadow-sm p-3 mb-2 bg-white rounded-4" style="border-left: 5px solid ${h.keterangan === 'Terlambat' ? 'red' : 'green'}">
            <b>${h.tipe}</b> - <small>${h.keterangan}</small><br>
            <span class="text-muted small">${new Date(h.created_at).toLocaleString()}</span>
        </div>
    `).join('');
}
</script>
</body>
</html>
