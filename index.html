// 1. Fungsi Upload Foto (Otomatis Simpan ke Supabase)
async function uploadFotoProfil(input) {
  if (input.files && input.files[0]) {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = async (e) => {
      const base64 = e.target.result;
      // Update UI preview
      document.getElementById("p-img").src = base64;
      document.getElementById("mini-avatar").src = base64;

      // Update ke Database
      const { error } = await _supabase
        .from("profil_guru")
        .update({ foto_avatar: base64 })
        .eq("username", currentUser);

      if (error) alert("Gagal simpan foto: " + error.message);
      else alert("Foto profil diperbarui!");
    };
    reader.readAsDataURL(file);
  }
}

// 2. Fungsi Update Nama & Jabatan
async function updateProfile() {
  const nama = document.getElementById("edit-nama").value;
  const jabatan = document.getElementById("edit-jabatan").value;

  const { error } = await _supabase
    .from("profil_guru")
    .update({ nama_lengkap: nama, jabatan: jabatan })
    .eq("username", currentUser);

  if (error) {
    alert("Gagal update profil: " + error.message);
  } else {
    alert("Profil berhasil disimpan!");
    // Update tampilan halaman depan secara langsung
    document.getElementById("user-display").innerText = nama;
    document.getElementById("user-role-display").innerText = jabatan || "GURU / STAFF";
    // Update data lokal
    userData.nama_lengkap = nama;
    userData.jabatan = jabatan;
    showScreen("main-app");
  }
}

// 3. Fungsi Load Riwayat (Sesuai Struktur Admin: Masuk Kiri, Pulang Kanan)
async function loadUserHistory() {
  const container = document.getElementById("user-history-list");
  container.innerHTML = '<p class="text-center small text-muted py-3">Memuat riwayat...</p>';

  const { data: presensi } = await _supabase
    .from("presensi")
    .select("*")
    .eq("nama_guru", currentUser)
    .order("created_at", { ascending: false })
    .limit(30);

  if (!presensi || presensi.length === 0) {
    container.innerHTML = '<p class="text-center small text-muted py-3">Belum ada riwayat presensi.</p>';
    return;
  }

  // Kelompokkan data per tanggal
  const historyMap = {};
  presensi.forEach((item) => {
    const tgl = new Date(item.created_at).toLocaleDateString("id-ID", {
      weekday: "long",
      day: "numeric",
      month: "short",
    });
    if (!historyMap[tgl]) historyMap[tgl] = { masuk: null, pulang: null, izin: null };
    if (item.tipe === "Masuk") historyMap[tgl].masuk = item;
    if (item.tipe === "Izin") historyMap[tgl].izin = item;
    if (item.tipe === "Pulang") historyMap[tgl].pulang = item;
  });

  let html = "";
  for (const tgl in historyMap) {
    const m = historyMap[tgl].masuk;
    const i = historyMap[tgl].izin;
    const p = historyMap[tgl].pulang;

    const jamM = m ? new Date(m.created_at).toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" }) : "--:--";
    const jamP = p ? new Date(p.created_at).toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" }) : "--:--";

    html += `
      <div class="bg-white mb-2 p-2 shadow-sm rounded-3 border" style="border-color: #e2e8f0;">
          <div class="text-muted fw-bold mb-2 px-1" style="font-size:9px; text-transform: uppercase; color: #64748b;">${tgl}</div>
          <div class="d-flex justify-content-between align-items-center gap-2">
              <div class="d-flex align-items-center gap-2" style="flex: 1;">
                  <div class="text-center" style="min-width: 70px;">
                      <div class="label-jam">MASUK</div>
                      <div class="waktu-teks" style="font-size:13px !important;">${jamM}</div>
                      ${i ? '<small style="display: block; color: #f59e0b; font-weight: 700; font-size: 8px; margin-top: 2px;">IZIN</small>' : ''}
                      ${m?.keterangan === 'Terlambat' ? '<small style="display: block; color: #ef4444; font-weight: 700; font-size: 8px; margin-top: 2px;">TERLAMBAT</small>' : ''}
                  </div>
                  <div class="admin-thumb-box" style="width:35px; height:35px; border-radius: 8px;" onclick="${m?.foto ? `viewPhoto('${m.foto}', 'Masuk: ${tgl}')` : ""}">
                      ${m?.foto ? `<img src="${m.foto}" style="width:100%; height:100%; object-fit: cover;">` : '<small style="font-size:7px; color:#cbd5e1;">FOTO</small>'}
                  </div>
              </div>
              <div class="d-flex align-items-center gap-2" style="flex: 1;">
                  <div class="text-center" style="min-width: 70px;">
                      <div class="label-jam">PULANG</div>
                      <div class="waktu-teks" style="font-size:13px !important;">${jamP}</div>
                      ${p?.keterangan === 'Terlambat' ? '<small style="display: block; color: #ef4444; font-weight: 700; font-size: 8px; margin-top: 2px;">TERLAMBAT</small>' : ''}
                  </div>
                  <div class="admin-thumb-box" style="width:35px; height:35px; border-radius: 8px;" onclick="${p?.foto ? `viewPhoto('${p.foto}', 'Pulang: ${tgl}')` : ""}">
                      ${p?.foto ? `<img src="${p.foto}" style="width:100%; height:100%; object-fit: cover;">` : '<small style="font-size:7px; color:#cbd5e1;">FOTO</small>'}
                  </div>
              </div>
          </div>
      </div>`;
  }
  container.innerHTML = html;
}

// 5. LOAD MONTHLY HISTORY DASHBOARD
async function loadMonthlyHistory() {
  const monthFilter = document.getElementById("month-filter");
  if (!monthFilter.value) {
    const now = new Date();
    monthFilter.value = now.toISOString().slice(0, 7);
  }

  const [year, month] = monthFilter.value.split("-");
  const startDate = new Date(year, parseInt(month) - 1, 1).toISOString();
  const endDate = new Date(year, parseInt(month), 0, 23, 59, 59).toISOString();

  const container = document.getElementById("history-list-monthly");
  container.innerHTML = '<p class="text-center text-muted py-4">Memuat riwayat...</p>';

  const { data: presensi } = await _supabase
    .from("presensi")
    .select("*")
    .eq("nama_guru", currentUser)
    .gte("created_at", startDate)
    .lte("created_at", endDate)
    .order("created_at", { ascending: false });

  if (!presensi || presensi.length === 0) {
    container.innerHTML = '<p class="text-center text-muted py-4">Belum ada riwayat presensi bulan ini.</p>';
    document.getElementById("count-masuk").textContent = "0";
    document.getElementById("count-izin").textContent = "0";
    return;
  }

  // Hitung statistik
  let countMasuk = 0, countIzin = 0;
  presensi.forEach(item => {
    if (item.tipe === "Masuk") countMasuk++;
    if (item.tipe === "Izin") countIzin++;
  });
  document.getElementById("count-masuk").textContent = countMasuk;
  document.getElementById("count-izin").textContent = countIzin;

  // Kelompokkan per tanggal
  const historyMap = {};
  presensi.forEach((item) => {
    const tgl = new Date(item.created_at).toLocaleDateString("id-ID", {
      weekday: "short",
      day: "2-digit",
      month: "short",
      year: "numeric",
    });
    if (!historyMap[tgl]) historyMap[tgl] = [];
    historyMap[tgl].push(item);
  });

  let html = "";
  for (const tgl in historyMap) {
    const items = historyMap[tgl];
    html += `<div class="bg-white p-3 rounded-3 shadow-sm mb-3 border" style="border-color: #e2e8f0;">
      <div class="fw-bold mb-2" style="font-size: 13px; color: #475569;">${tgl}</div>`;

    items.forEach((item) => {
      const jam = new Date(item.created_at).toLocaleTimeString("id-ID", { 
        hour: "2-digit", 
        minute: "2-digit" 
      });
      
      const badgeColor = item.tipe === "Masuk" ? "success" : item.tipe === "Pulang" ? "info" : "warning";
      const badgeText = item.tipe === "Izin" ? "IZIN" : item.tipe;
      const statusTerlambat = item.keterangan === "Terlambat" ? '<span style="margin-left: 8px; font-size: 10px; background: #fee2e2; color: #991b1b; padding: 2px 6px; border-radius: 3px;">⚠️ TERLAMBAT</span>' : '';

      html += `<div class="d-flex justify-content-between align-items-center p-2 bg-light rounded mb-2">
        <div class="d-flex align-items-center gap-2" style="flex: 1;">
          <span class="badge bg-${badgeColor}" style="font-size: 11px; padding: 4px 8px; font-weight: 700;">${badgeText}</span>
          <div>
            <div style="font-size: 12px; font-weight: 600;">${jam}</div>
            <small style="color: #64748b; font-size: 10px;">${item.keterangan || "-"}</small>
            ${statusTerlambat}
          </div>
        </div>
        <div class="admin-thumb-box" style="width: 40px; height: 40px; border-radius: 8px; cursor: pointer;" onclick="${item.foto ? `viewPhoto('${item.foto}', '${badgeText}: ${tgl}')` : ""}">
          ${item.foto ? `<img src="${item.foto}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;">` : '<small style="font-size: 8px; color: #cbd5e1;">NO FOTO</small>'}
        </div>
      </div>`;
    });

    html += '</div>';
  }
  container.innerHTML = html;
}

function viewPhoto(url, title) {
    document.getElementById('modal-img').src = url;
    document.getElementById('modal-title').innerText = title;

}

      async function checkAutoLogin() {

        .from("admin_users")
        .select("*")
        .eq("username", u)
        .eq("password", p)
        .single();

    if (adm) {
        // Jika admin tidak punya kolom 'nama_lengkap', kita pakai 'username' sebagai pengganti
        const adminData = {
            ...adm,
            nama_lengkap: adm.nama_lengkap || adm.username, 
            jabatan: adm.role === 'superadmin' ? "SUPER ADMIN" : "ADMIN MONITORING"
        };
        processLogin(adminData, adm.role || "admin"); 
        return;
    }

    // CEK TABEL PROFIL (GURU)
    const { data: guru, error: errGuru } = await _supabase
        .from("profil") 
        .select("*")
        .eq("username", u)

async function checkTodayPresence() {
    // Ambil tanggal hari ini format YYYY-MM-DD (Waktu Indonesia)
    const n = new Date();
    const tgl = new Date(n.getTime() - (n.getTimezoneOffset() * 60000)).toISOString().split("T")[0];

    try {
        const { data, error } = await _supabase
            .from("presensi")
            .select("tipe")
            .eq("nama_guru", currentUser)
            .gte("created_at", tgl);

        if (error) throw error;

        // Reset tombol ke keadaan aktif dulu sebelum dicek
        const btnM = document.getElementById("btn-masuk");
        const btnI = document.getElementById("btn-izin");
        const btnP = document.getElementById("btn-pulang");

        if (data && data.length > 0) {
            const sudahMasuk = data.some((d) => d.tipe === "Masuk");
            const sudahIzin = data.some((d) => d.tipe === "Izin");
            const sudahPulang = data.some((d) => d.tipe === "Pulang");

            // Jika sudah Masuk ATAU sudah Izin
            if (sudahMasuk || sudahIzin) {

                }
            }

            // Jika sudah Pulang ATAU sedang Izin (Izin tidak perlu absen pulang)
            if (sudahPulang || sudahIzin) {

                    btnP.classList.add("btn-disabled");

                    btnP.innerText = sudahIzin ? "TIDAK PERLU" : "SUDAH PULANG";

            }

    } catch (err) {
        console.error("Gagal cek status kehadiran:", err.message);
    }

// --- 2. FUNGSI AMBIL ABSEN (MASUK/PULANG) ---
async function takeAbsen(tipe) {
    const now = new Date();
    const h = now.getHours();

    // Validasi Jam Pulang
    if (tipe === "Pulang" && (h < jamPulangBuka || h >= jamPulangTutup)) {
        return alert(`Belum waktunya pulang! (${jamPulangBuka}:00 - ${jamPulangTutup}:00)`);
    }

    navigator.geolocation.getCurrentPosition(async (pos) => {
        const uLat = pos.coords.latitude;
        const uLon = pos.coords.longitude;
        const dist = calculateDistance(uLat, uLon, SCHOOL_LAT, SCHOOL_LON);

        if (dist > MAX_DISTANCE) {
            return alert(`Terlalu jauh! (${Math.round(dist)}m dari sekolah)`);
        }

        // Proses Foto
        const cvs = document.getElementById("canvas");
        cvs.width = 400;
        cvs.height = 400;
        const ctx = cvs.getContext("2d");
        ctx.translate(400, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(document.getElementById("video"), 0, 0, 400, 400);
        const img = cvs.toDataURL("image/webp", 0.5);

        // Tentukan Keterangan Terlambat (Masuk > 07:00)
        let ket = "Tepat Waktu";
        if (tipe === "Masuk" && h >= 7) {
            ket = "Terlambat";
        }

        const { error } = await _supabase.from("presensi").insert([
            {
                nama_guru: currentUser,
                tipe: tipe,
                keterangan: ket,
                foto: img,
                latitude: uLat,
                longitude: uLon,
            },
        ]);

        if (error) {
            alert("Gagal: " + error.message);
        } else {
            alert(`Absen ${tipe} Berhasil!`);
            checkTodayPresence(); // Kunci tombol setelah berhasil
        }
    }, (err) => {
        alert("Gagal mengambil lokasi. Pastikan GPS aktif dan izin lokasi diberikan!");
    });
}

      function updateClock() {
        const n = new Date();
        const h = n.getHours();
        const clockEl = document.getElementById("clock");
        const dateEl = document.getElementById("date");
        if (clockEl)
          clockEl.innerText = n.toLocaleTimeString("id-ID", {
            hour: "2-digit",
            minute: "2-digit",
          });
        if (dateEl) {
          const weekday = n.toLocaleDateString("id-ID", { weekday: "long" });
          const day = n.getDate();
          const month = n.toLocaleDateString("id-ID", { month: "long" });
          dateEl.innerText = `${weekday.toUpperCase()}, ${day} ${month.toUpperCase()}`;
        }

        const btnP = document.getElementById("btn-pulang");
        const msgP = document.getElementById("lock-msg");
        if (btnP) {
          if (h >= jamPulangBuka && h < jamPulangTutup) {
            btnP.classList.remove("btn-disabled");
            if (msgP) msgP.innerText = "Tombol pulang sudah aktif";
          } else {
            btnP.classList.add("btn-disabled");
            if (msgP)
              msgP.innerText = `Tombol Pulang dibuka jam ${jamPulangBuka}:00 - ${jamPulangTutup}:00`;
          }
        }
      }

      function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const d1 = (lat1 * Math.PI) / 180;
        const d2 = (lat2 * Math.PI) / 180;
        const df = ((lat2 - lat1) * Math.PI) / 180;
        const dl = ((lon2 - lon1) * Math.PI) / 180;
        const a =
          Math.sin(df / 2) ** 2 +
          Math.cos(d1) * Math.cos(d2) * Math.sin(dl / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      async function exportDataHorizontal() {

          const kini = new Date();
const startOfDay = new Date(kini.getFullYear(), kini.getMonth(), kini.getDate(), 0, 0, 0);
const tglISO = startOfDay.toISOString(); 
const tglNamaFile = kini.toISOString().split("T")[0]; // Untuk nama file YYYY-MM-DD

          const { data: pres } = await _supabase
            .from("presensi")
            .select("*")
            .gte("created_at",  tglISO);

          if (!pres || pres.length === 0)
            return alert("Belum ada data absen untuk hari ini.");

          // 3. Mapping Data Menjadi Horizontal (Satu Guru Satu Baris)
          const reportData = gurus.map((g) => {
            // Cari data masuk/izin
            const m = pres.find(
              (x) =>
                x.nama_guru === g.username &&
                (x.tipe === "Masuk" || x.tipe === "Izin"),
            );
            // Cari data pulang
            const p = pres.find(
              (x) => x.nama_guru === g.username && x.tipe === "Pulang",
            );

            return {
              "NAMA GURU": g.nama_lengkap,
              STATUS: m
                ? m.tipe === "Izin"
                  ? "IZIN: " + m.keterangan
                  : m.keterangan
                : "ALFA",
              "JAM MASUK": m
                ? new Date(m.created_at).toLocaleTimeString("id-ID", {
                    hour: "2-digit",
                    minute: "2-digit",
                  })
                : "--:--",
              "JAM PULANG": p
                ? new Date(p.created_at).toLocaleTimeString("id-ID", {
                    hour: "2-digit",
                    minute: "2-digit",
                  })
                : "--:--",
              TANGGAL: tgl,
            };
          });

          // 4. Proses konversi ke Excel menggunakan library XLSX
          const worksheet = XLSX.utils.json_to_sheet(reportData);
          const workbook = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(workbook, worksheet, "Rekap Presensi");

          // 5. Download File
          XLSX.writeFile(workbook, `Rekap_Presensi_${tgl}.xlsx`);
