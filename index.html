    <style>

        :root {

        body {
            margin: 0;

            background: linear-gradient(-45deg, #6366f1, #a855f7, #ec4899);

            animation: gradientBG 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-shell {
            width: 100%;
            max-width: 430px;
            height: 92vh;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            overflow-y: auto;

            border: 4px solid white;

        .school-banner {

            flex-direction: column;

            width: 100%;
            margin-top: 10px;
            flex-direction: row;
            justify-content: center;
            gap: 10px;
        }

        .btn-disabled {
            background: #cbd5e1 !important;
            color: #64748b !important;
            opacity: 0.6;
            cursor: not-allowed;
        }

        .user-card {
            background: white;
            border-radius: 18px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #f1f5f9;
        }

        .admin-thumb {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .admin-thumb:hover {
            transform: scale(1.1);
        }

        #photo-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 25px;
        }

        .modal-content-img {
            background: white;
            padding: 15px;
            border-radius: 25px;
            width: 100%;
            max-width: 320px;
            text-align: center;
        }

        .pass-container { position: relative; }

        .toggle-pass {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #64748b;
        }

        #login-screen,
        #register-screen,
        #main-app,
        #admin-panel,

            padding: 20px;
