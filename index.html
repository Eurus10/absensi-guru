<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Presensi Guru v3.1</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="apple-touch-icon" href="ChatGPTImageApr1202609_31_16PM.jpeg">
    <link rel="icon" type="image/jpeg" href="ChatGPTImageApr1202609_31_16PM.jpeg">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --danger: #ef4444; }
        
        body { 
            margin: 0; min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(-45deg, #6366f1, #a855f7, #ec4899); 
            background-size: 400% 400%; animation: gradientBG 10s ease infinite; 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .app-shell { 
            width: 100%; max-width: 430px; height: 92vh; background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(15px); border-radius: 35px; overflow-y: auto; position: relative; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
        }

        .school-banner { padding: 20px; text-align: center; background: white; border-radius: 0 0 30px 30px; border-bottom: 2px solid #f0f0f0; }
        .school-logo { width: 60px; height: 60px; border-radius: 15px; object-fit: cover; }
        
        /* Camera Preview Fix Mirror */
        .camera-container { margin: 15px; border-radius: 25px; overflow: hidden; height: 220px; border: 4px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); background: #000; }
        #video { 
            width: 100%; height: 100%; object-fit: cover; 
            transform: scaleX(-1); -webkit-transform: scaleX(-1); 
        }
        
        .btn-action { border-radius: 20px; padding: 18px; font-weight: 800; border: none; color: white; margin-bottom: 12px; width: 100%; transition: 0.3s; }
        .btn-masuk { background: linear-gradient(135deg, #10b981, #059669); }
        .btn-pulang { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .btn-disabled { background: #cbd5e1 !important; color: #64748b !important; cursor: not-allowed; opacity: 0.8; }
        
        #login-screen, #register-screen, #main-app, #admin-panel, #profile-page { display: none; padding: 20px; }
        
        /* Modals */
        #photo-modal, #reminder-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content-custom { background: white; border-radius: 30px; width: 100%; max-width: 350px; text-align: center; padding: 25px; }

        .user-card { background: white; border-radius: 15px; padding: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; border-left: 5px solid #eee; }
        .status-done { border-left-color: var(--success); }
        .status-none { border-left-color: var(--danger); }
        .user-avatar-mini { width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; object-fit: cover; background: #f0f0f0; }
    </style>
</head>
<body>

<div id="reminder-modal">
    <div class="modal-content-custom">
        <div class="text-danger mb-3"><i class="fas fa-bell fa-4x"></i></div>
        <h5 class="fw-bold">Belum Absen!</h5>
        <p class="text-muted small">Halo Bapak/Ibu, Anda belum melakukan presensi hari ini. Silahkan segera absen.</p>
        <button class="btn btn-primary w-100 rounded-pill fw-bold" onclick="document.getElementById('reminder-modal').style.display='none'">ABSEN SEKARANG</button>
    </div>
</div>

<div id="photo-modal" onclick="this.style.display='none'">
    <div class="modal-content-custom" onclick="event.stopPropagation()">
        <h6 class="fw-bold mb-3" id="modal-title">Foto Presensi</h6>
        <img id="modal-img-src" src="" style="width:100%; border-radius:20px; margin-bottom:15px;">
        <button class="btn btn-dark w-100 rounded-pill" onclick="document.getElementById('photo-modal').style.display='none'">Tutup</button>
    </div>
</div>

<div class="app-shell">
    <div class="school-banner">
        <img id="logo-img" src="ChatGPTImageApr1202609_31_16PM.jpeg" class="school-logo">
        <h6 id="school-name" class="fw-bold m-0 text-uppercase" style="color: var(--primary); font-size: 0.75rem;">MEMUAT...</h6>
    </div>

    <div id="login-screen" class="text-center">
        <div class="mt-5 mb-4 text-primary"><i class="fas fa-fingerprint" style="font-size: 4rem;"></i></div>
        <h4 class="fw-bold mb-4">E-Presensi v3.1</h4>
        <input type="text" id="login-user" class="form-control mb-3 p-3 rounded-pill border-0 shadow-sm" placeholder="Username">
        <div class="position-relative mb-4">
            <input type="password" id="login-pass" class="form-control p-3 rounded-pill border-0 shadow-sm" placeholder="Password">
            <i class="fas fa-eye position-absolute translate-middle-y top-50 end-0 me-3 text-muted" style="cursor:pointer" onclick="togglePass('login-pass', this)"></i>
        </div>
        <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold mb-3 shadow" onclick="handleLogin()">MASUK</button>
        <p class="small text-muted">Guru baru? <a href="javascript:void(0)" class="fw-bold text-decoration-none" onclick="showScreen('register-screen')">Daftar</a></p>
    </div>

    <div id="register-screen">
        <h4 class="fw-bold mb-4 text-center">Buat Akun</h4>
        <input type="text" id="reg-nama" class="form-control mb-3 p-3 rounded-4" placeholder="Nama Lengkap">
        <input type="text" id="reg-user" class="form-control mb-3 p-3 rounded-4" placeholder="Username">
        <input type="password" id="reg-pass" class="form-control mb-4 p-3 rounded-4" placeholder="Password">
        <button class="btn btn-dark w-100 py-3 rounded-pill fw-bold" onclick="handleRegister()">DAFTAR</button>
        <button class="btn btn-link w-100 mt-2 text-muted text-decoration-none" onclick="showScreen('login-screen')">Kembali</button>
    </div>

    <div id="main-app">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div><small class="text-muted">Guru:</small><h6 class="fw-bold m-0" id="user-display">-</h6></div>
            <img id="mini-avatar" src="" style="width:50px; height:50px; border-radius:50%; border:2px solid white; object-fit:cover; cursor:pointer" onclick="showProfile()">
        </div>
        <div class="camera-container"><video id="video" autoplay playsinline></video></div>
        <div class="text-center">
            <h2 id="clock" class="fw-bold mb-0">00:00</h2>
            <p id="date" class="text-muted small mb-3"></p>
            <button id="btn-masuk" class="btn-action btn-masuk shadow-lg" onclick="takeAbsen('Masuk')">ABSEN MASUK</button>
            <button id="btn-pulang" class="btn-action btn-pulang shadow-lg" onclick="takeAbsen('Pulang')">ABSEN PULANG</button>
            <p id="info-pulang" class="text-danger small fw-bold d-none">Pulang dibuka jam 14:00</p>
        </div>
    </div>

    <div id="admin-panel">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold m-0">Admin Dashboard</h5>
            <button class="btn btn-success btn-sm rounded-pill px-3" onclick="exportData()">Excel</button>
        </div>
        <div id="list-sudah"></div>
        <div id="list-belum" class="mt-4"></div>
        <button class="btn btn-link w-100 mt-4 text-danger text-decoration-none" onclick="logout()">LOGOUT</button>
    </div>

    <div id="profile-page">
        <button class="btn btn-light rounded-pill btn-sm mb-3" onclick="showScreen('main-app')"><i class="fas fa-arrow-left"></i> Kembali</button>
        <div class="text-center mb-4">
            <img id="p-img" src="" style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
            <h5 id="p-nama" class="fw-bold mt-2">-</h5>
            <input type="file" id="input-foto" style="display:none" onchange="uploadFotoProfil(this)">
            <button class="btn btn-sm btn-outline-primary rounded-pill mt-1" onclick="document.getElementById('input-foto').click()">Ubah Foto</button>
        </div>
        <h6 class="fw-bold small mb-2">Riwayat Presensi</h6>
        <div id="history-list"></div>
        <button class="btn btn-outline-danger btn-sm w-100 mt-4 rounded-pill" onclick="logout()">LOGOUT</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const SUPABASE_URL = 'https://dddbjqnoovjbdesvaulo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkZGJqcW5vb3ZqYmRlc3ZhdWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDAzMTUsImV4cCI6MjA5MDYxNjMxNX0.yLeBX4C8bwpCngvOViMR-eocHVFjv0BXXBuPJWwb9KU';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const SCHOOL_LAT = -6.250736361618612;
const SCHOOL_LON = 106.46656879999998;
const MAX_DISTANCE = 50; 

let currentUser = "";
let userData = null;

window.onload = () => { updateClock(); setInterval(updateClock, 1000); loadSchoolData(); checkAutoLogin(); };

// --- LOGIN & AUTH ---
async function checkAutoLogin() {
    const savedU = localStorage.getItem('guru_user');
    const savedP = localStorage.getItem('guru_pass');
    if (savedU && savedP) {
        if(savedU === "admin") { showScreen('admin-panel'); loadAdminDashboard(); }
        else {
            const { data } = await _supabase.from('profil_guru').select('*').eq('username', savedU).eq('password', savedP).single();
            if(data) processLogin(data); else showScreen('login-screen');
        }
    } else showScreen('login-screen');
}

function processLogin(data) {
    currentUser = data.username; userData = data;
    document.getElementById('user-display').innerText = data.nama_lengkap;
    document.getElementById('mini-avatar').src = data.foto_avatar || `https://ui-avatars.com/api/?name=${data.nama_lengkap}`;
    showScreen('main-app'); startCamera(); checkTodayPresence();
}

async function handleLogin() {
    const u = document.getElementById('login-user').value;
    const p = document.getElementById('login-pass').value;
    if(u === "admin" && p === "admin123") { localStorage.setItem('guru_user', u); localStorage.setItem('guru_pass', p); showScreen('admin-panel'); loadAdminDashboard(); return; }
    const { data } = await _supabase.from('profil_guru').select('*').eq('username', u).eq('password', p).single();
    if(data) { localStorage.setItem('guru_user', u); localStorage.setItem('guru_pass', p); processLogin(data); }
    else alert("Login Gagal!");
}

function logout() { localStorage.clear(); location.reload(); }

// --- PRESENSI & CAMERA FIX ---
async function takeAbsen(tipe) {
    const now = new Date();
    if(tipe === 'Pulang' && now.getHours() < 14) return alert("Belum jam 14:00!");
    
    navigator.geolocation.getCurrentPosition(async (pos) => {
        const uLat = pos.coords.latitude; const uLon = pos.coords.longitude;
        const R = 6371e3;
        const dLat = (SCHOOL_LAT - uLat) * Math.PI/180;
        const dLon = (SCHOOL_LON - uLon) * Math.PI/180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(uLat*Math.PI/180) * Math.cos(SCHOOL_LAT*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const jarak = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        
        if (jarak > MAX_DISTANCE) return alert(`Gagal! Jarak Anda ${Math.round(jarak)}m.`);
        
        const canvas = document.getElementById('canvas');
        canvas.width = 400; canvas.height = 400;
        const ctx = canvas.getContext('2d');
        
        // FIX: Supaya hasil foto TIDAK MIRROR
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(document.getElementById('video'), 0, 0, 400, 400);
        
        const imgData = canvas.toDataURL('image/webp', 0.5);
        const stts = (tipe === 'Masuk' && (now.getHours() > 7 || (now.getHours() === 7 && now.getMinutes() > 0))) ? "Terlambat" : "Tepat Waktu";
        
        await _supabase.from('presensi').insert([{ nama_guru: currentUser, tipe: tipe, keterangan: stts, foto: imgData, latitude: uLat, longitude: uLon }]);
        alert("Absen " + tipe + " Berhasil!"); checkTodayPresence();
    }, (err) => alert("GPS Nonaktif!"), { enableHighAccuracy: true });
}

async function checkTodayPresence() {
    const tgl = new Date().toISOString().split('T')[0];
    const { data } = await _supabase.from('presensi').select('tipe').eq('nama_guru', currentUser).gte('created_at', tgl);
    if(data.length === 0) document.getElementById('reminder-modal').style.display = 'flex';
    if(data.some(d => d.tipe === 'Masuk')) { let b = document.getElementById('btn-masuk'); b.classList.add('btn-disabled'); b.onclick = null; b.innerText = "SUDAH MASUK"; }
    if(data.some(d => d.tipe === 'Pulang')) { let b = document.getElementById('btn-pulang'); b.classList.add('btn-disabled'); b.onclick = null; b.innerText = "SUDAH PULANG"; }
}

// --- ADMIN & MISC ---
async function loadAdminDashboard() {
    const tgl = new Date().toISOString().split('T')[0];
    const { data: guru } = await _supabase.from('profil_guru').select('*').order('nama_lengkap');
    const { data: pres } = await _supabase.from('presensi').select('*').gte('created_at', tgl);
    const sudah = guru.filter(g => pres.some(p => p.nama_guru === g.username));
    const belum = guru.filter(g => !pres.some(p => p.nama_guru === g.username));
    
    document.getElementById('list-sudah').innerHTML = `<h6 class="small fw-bold text-muted">SUDAH ABSEN (${sudah.length})</h6>` + sudah.map(g => {
        const p1 = pres.find(p => p.nama_guru === g.username && p.tipe === 'Masuk');
        const p2 = pres.find(p => p.nama_guru === g.username && p.tipe === 'Pulang');
        return `<div class="user-card status-done"><img src="${g.foto_avatar || 'https://ui-avatars.com/api/?name='+g.nama_lengkap}" class="user-avatar-mini"><div style="flex:1"><div class="fw-bold small">${g.nama_lengkap}</div><div class="text-muted" style="font-size:10px">${p1 ? `<span onclick="viewPhoto('${p1.foto}', 'M: ${g.nama_lengkap}')"><i class="fas fa-camera"></i> M: ${new Date(p1.created_at).toLocaleTimeString()}</span>` : 'M:-'} | ${p2 ? `<span onclick="viewPhoto('${p2.foto}', 'P: ${g.nama_lengkap}')"><i class="fas fa-camera"></i> P: ${new Date(p2.created_at).toLocaleTimeString()}</span>` : 'P:-'}</div></div></div>`;
    }).join('');

    document.getElementById('list-belum').innerHTML = `<h6 class="small fw-bold text-muted mt-3">BELUM ABSEN (${belum.length})</h6>` + belum.map(g => `<div class="user-card status-none"><img src="${g.foto_avatar || 'https://ui-avatars.com/api/?name='+g.nama_lengkap}" class="user-avatar-mini"><div class="fw-bold small">${g.nama_lengkap}</div></div>`).join('');
}

function viewPhoto(img, title) { document.getElementById('modal-img-src').src = img; document.getElementById('modal-title').innerText = title; document.getElementById('photo-modal').style.display = 'flex'; }
function togglePass(id, icon) { const x = document.getElementById(id); if (x.type === "password") { x.type = "text"; icon.classList.replace('fa-eye', 'fa-eye-slash'); } else { x.type = "password"; icon.classList.replace('fa-eye-slash', 'fa-eye'); } }
function showScreen(id) { ['login-screen', 'register-screen', 'main-app', 'admin-panel', 'profile-page'].forEach(s => document.getElementById(s).style.display = (s === id) ? 'block' : 'none'); }
function updateClock() { const n = new Date(); document.getElementById('clock').innerText = n.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}); document.getElementById('date').innerText = n.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long'}); if (n.getHours() < 14) document.getElementById('info-pulang').classList.remove('d-none'); else document.getElementById('info-pulang').classList.add('d-none'); }
async function loadSchoolData() { const { data } = await _supabase.from('pengaturan').select('*').eq('id', 1).single(); if(data) document.getElementById('school-name').innerText = data.nama_sekolah; }
function startCamera() { navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => document.getElementById('video').srcObject = s); }
async function handleRegister() { const n = document.getElementById('reg-nama').value; const u = document.getElementById('reg-user').value; const p = document.getElementById('reg-pass').value; const { error } = await _supabase.from('profil_guru').insert([{ username: u, password: p, nama_lengkap: n }]); if(!error) { alert("Berhasil!"); showScreen('login-screen'); } else alert("Gagal!"); }
async function uploadFotoProfil(input) { const f = input.files[0]; const r = new FileReader(); r.onload = async (e) => { const b64 = e.target.result; await _supabase.from('profil_guru').update({ foto_avatar: b64 }).eq('username', currentUser); document.getElementById('p-img').src = b64; document.getElementById('mini-avatar').src = b64; alert("Foto diperbarui!"); }; r.readAsDataURL(f); }
async function showProfile() { showScreen('profile-page'); document.getElementById('p-nama').innerText = userData.nama_lengkap; document.getElementById('p-img').src = userData.foto_avatar || `https://ui-avatars.com/api/?name=${userData.nama_lengkap}`; const { data } = await _supabase.from('presensi').select('*').eq('nama_guru', currentUser).order('created_at', {ascending:false}).limit(10); document.getElementById('history-list').innerHTML = data.map(h => `<div class="bg-white p-2 mb-2 rounded shadow-sm small" style="border-left:4px solid ${h.keterangan==='Terlambat'?'red':'green'}"><b>${h.tipe}</b> - ${h.keterangan}<br><span class="text-muted">${new Date(h.created_at).toLocaleString()}</span></div>`).join(''); }
async function exportData() { const { data } = await _supabase.from('presensi').select('*').order('created_at', {ascending:true}); const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Absensi"); XLSX.writeFile(wb, "Laporan_Absen.xlsx"); }
</script>
</body>
</html>
