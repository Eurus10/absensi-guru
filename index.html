<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Presensi v3.11</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --primary: #6366f1; --success: #10b981; --danger: #ef4444; }
        
        body { 
            margin: 0; padding: 0; height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f1f5f9; display: flex; justify-content: center; overflow: hidden;
        }

        /* Anti-Flash Loading State */
        #app-wrapper { display: none; width: 100%; max-width: 480px; height: 100vh; background: #fff; flex-direction: column; position: relative; }

        .top-bar { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #fff; border-bottom: 1px solid #f1f5f9; }
        
        /* Layout Absensi - Centered & Spaced */
        #main-app { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: space-evenly; padding: 20px; 
        }

        .camera-box {
            width: 240px; height: 240px; border-radius: 50%; overflow: hidden;
            border: 6px solid #fff; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            background: #000; position: relative;
        }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .clock-section { text-align: center; }
        .clock-big { font-size: 3.5rem; font-weight: 800; color: #1e293b; letter-spacing: -2px; line-height: 1; }
        
        /* Buttons Optimized */
        .action-area { width: 100%; padding-bottom: 20px; }
        .btn-main { 
            border: none; border-radius: 20px; padding: 18px; color: white; 
            font-weight: 800; transition: 0.3s; width: 100%; font-size: 1rem;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-masuk { background: linear-gradient(135deg, #6366f1, #4f46e5); box-shadow: 0 10px 20px rgba(99,102,241,0.3); }
        .btn-izin { background: #f8fafc; color: #64748b; border: 1px solid #e2e8f0; margin-top: 10px; }
        .btn-pulang { background: var(--danger); margin-top: 10px; box-shadow: 0 10px 20px rgba(239,68,68,0.3); }
        
        .btn-disabled { background: #e2e8f0 !important; color: #94a3b8 !important; box-shadow: none !important; cursor: not-allowed; }

        /* Admin/History Items */
        .card-item { background: #f8fafc; border-radius: 16px; padding: 15px; margin-bottom: 12px; border: 1px solid #f1f5f9; }
        
        #login-screen { padding: 40px 25px; text-align: center; }
        .input-custom { background: #f1f5f9; border: none; padding: 15px 20px; border-radius: 15px; margin-bottom: 15px; width: 100%; }

        .screen { display: none; height: 100%; overflow-y: auto; }
        .active-screen { display: flex !important; flex-direction: column; }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="header-nav" class="top-bar">
        <div class="d-flex align-items-center gap-2">
            <img id="mini-avatar" src="" style="width:40px; height:40px; border-radius:12px; display:none;" onclick="showScreen('profile-page')">
            <div><small class="text-muted d-block" style="font-size: 0.7rem;">E-PRESENSI</small><b id="user-display" style="font-size: 0.9rem;">Guru</b></div>
        </div>
        <img src="ChatGPTImageApr1202609_31_16PM.jpeg" style="width:35px; height:35px; border-radius:8px;">
    </div>

    <div id="main-app" class="screen">
        <div class="clock-section">
            <h1 class="clock-big" id="clock">00:00</h1>
            <div id="date" class="fw-bold text-muted small mt-1">JUMAT, 3 APRIL 2026</div>
        </div>

        <div class="camera-box"><video id="video" autoplay playsinline></video></div>

        <div class="action-area">
            <button id="btn-masuk" class="btn-main btn-masuk" onclick="takeAbsen('Masuk')">
                <i class="fas fa-fingerprint"></i> ABSEN MASUK
            </button>
            <div class="row gx-2">
                <div class="col-6"><button id="btn-izin" class="btn-main btn-izin" onclick="takeIzin()">IZIN</button></div>
                <div class="col-6"><button id="btn-pulang" class="btn-main btn-pulang" onclick="takeAbsen('Pulang')">PULANG</button></div>
            </div>
            <p id="lock-msg" class="text-center text-muted small mt-3 fw-bold mb-0">Jam Pulang: <span id="view-jam-pulang">14:00</span></p>
        </div>
    </div>

    <div id="admin-panel" class="screen p-3">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold m-0">Data Harian</h4>
            <div class="d-flex gap-2">
                <button class="btn btn-light rounded-pill border" onclick="showScreen('admin-settings')"><i class="fas fa-cog"></i></button>
                <button class="btn btn-success rounded-pill fw-bold" onclick="exportDataHorizontal()">EXCEL</button>
            </div>
        </div>
        <div id="list-admin-view" class="flex-grow-1"></div>
        <button class="btn btn-outline-danger w-100 rounded-pill mt-3" onclick="logout()">LOGOUT</button>
    </div>

    <div id="profile-page" class="screen p-4">
        <div class="text-center mb-4">
            <img id="p-img" src="" style="width:100px; height:100px; border-radius:30px; border:4px solid #f1f5f9;">
            <h5 id="p-nama" class="fw-bold mt-3">--</h5>
        </div>
        <label class="fw-bold small text-muted mb-2">RIWAYAT PRESENSI</label>
        <div id="login-history" class="mb-4"></div>
        <button class="btn btn-primary w-100 rounded-pill mb-2 p-3 fw-bold" onclick="showScreen('main-app')">KEMBALI</button>
        <button class="btn btn-light w-100 rounded-pill p-3 text-danger fw-bold" onclick="logout()">KELUAR APLIKASI</button>
    </div>

    <div id="login-screen" class="screen active-screen">
        <img src="ChatGPTImageApr1202609_31_16PM.jpeg" style="width:80px; margin-bottom:20px; border-radius:20px;">
        <h3 class="fw-bold">Selamat Datang</h3>
        <p class="text-muted mb-5">Silakan login untuk absensi</p>
        <input type="text" id="login-user" class="input-custom" placeholder="Username">
        <input type="password" id="login-pass" class="input-custom" placeholder="Password">
        <button class="btn btn-primary w-100 p-3 rounded-pill fw-bold mt-3 shadow" onclick="handleLogin()">MASUK SEKARANG</button>
    </div>

    <div id="admin-settings" class="screen p-4">
        <h5 class="fw-bold mb-4">Pengaturan Sistem</h5>
        <div class="card-item">
            <label class="small fw-bold mb-2">Set Jam Pulang</label>
            <input type="time" id="set-jam-pulang" class="form-control mb-3 p-3 rounded-3">
            <button class="btn btn-primary w-100 rounded-pill p-3 fw-bold" onclick="saveSettings()">UPDATE JAM</button>
        </div>
        <button class="btn btn-light w-100 rounded-pill mt-auto" onclick="showScreen('admin-panel')">BATAL</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const SUPABASE_URL = 'https://dddbjqnoovjbdesvaulo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkZGJqcW5vb3ZqYmRlc3ZhdWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDAzMTUsImV4cCI6MjA5MDYxNjMxNX0.yLeBX4C8bwpCngvOViMR-eocHVFjv0BXXBuPJWwb9KU';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const SCHOOL_LOC = { lat: -6.250736, lon: 106.466568, radius: 50 };
let currentUser = "", jamPulang = "14:00";

// --- INITIALIZE ---
document.addEventListener('DOMContentLoaded', async () => {
    updateClock(); setInterval(updateClock, 1000);
    await checkAutoLogin();
    document.getElementById('app-wrapper').style.display = 'flex';
});

async function checkAutoLogin() {
    const u = localStorage.getItem('guru_user'), p = localStorage.getItem('guru_pass');
    if(u && p) {
        await performLogin(u, p, true);
    } else {
        showScreen('login-screen');
    }
}

async function handleLogin() {
    const u = document.getElementById('login-user').value, p = document.getElementById('login-pass').value;
    await performLogin(u, p, false);
}

async function performLogin(u, p, isAuto) {
    // Admin Check
    const { data: adm } = await _supabase.from('admin_users').select('*').eq('username', u).eq('password', p).single();
    if(adm) {
        saveCreds(u, p); showScreen('admin-panel'); return;
    }
    // Guru Check
    const { data: guru } = await _supabase.from('profil_guru').select('*').eq('username', u).eq('password', p).single();
    if(guru) {
        saveCreds(u, p); currentUser = u;
        document.getElementById('user-display').innerText = guru.nama_lengkap;
        document.getElementById('p-nama').innerText = guru.nama_lengkap;
        const av = guru.foto_avatar || `https://ui-avatars.com/api/?name=${u}`;
        document.getElementById('mini-avatar').src = av; document.getElementById('mini-avatar').style.display = 'block';
        document.getElementById('p-img').src = av;
        await loadSettings();
        await checkTodayStatus();
        showScreen('main-app');
        startCamera();
    } else if(!isAuto) alert("Login Gagal!");
}

function saveCreds(u, p) { localStorage.setItem('guru_user', u); localStorage.setItem('guru_pass', p); }

// --- CORE LOGIC ---
async function checkTodayStatus() {
    const tgl = new Date().toISOString().split('T')[0];
    const { data } = await _supabase.from('presensi').select('tipe').eq('nama_guru', currentUser).gte('created_at', tgl);
    
    if(data.some(d => d.tipe === 'Masuk' || d.tipe === 'Izin')) {
        const b = document.getElementById('btn-masuk');
        b.classList.add('btn-disabled');
        b.innerHTML = '<i class="fas fa-check-circle"></i> SUDAH ABSEN MASUK';
        b.onclick = null;
    }
}

async function loadSettings() {
    const { data } = await _supabase.from('pengaturan').select('*').eq('id', 1).single();
    if(data) {
        jamPulang = data.jam_pulang;
        document.getElementById('view-jam-pulang').innerText = jamPulang;
        document.getElementById('set-jam-pulang').value = jamPulang;
    }
}

function updateClock() {
    const n = new Date();
    document.getElementById('clock').innerText = n.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('date').innerText = n.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
    
    const [hC, mC] = jamPulang.split(':').map(Number);
    const btnP = document.getElementById('btn-pulang');
    if(n.getHours() > hC || (n.getHours() === hC && n.getMinutes() >= mC)) {
        btnP.classList.remove('btn-disabled');
    } else {
        btnP.classList.add('btn-disabled');
    }
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
    document.getElementById(id).classList.add('active-screen');
    document.getElementById('header-nav').style.display = (id === 'login-screen') ? 'none' : 'flex';
    if(id === 'profile-page') loadHistory();
    if(id === 'admin-panel') loadAdminDashboard();
}

async function takeAbsen(tipe) {
    if(tipe === 'Pulang' && document.getElementById('btn-pulang').classList.contains('btn-disabled')) return alert("Belum waktunya!");

    navigator.geolocation.getCurrentPosition(async (pos) => {
        const { latitude: uLat, longitude: uLon } = pos.coords;
        // Jarak Logic
        const R = 6371e3;
        const dLat = (SCHOOL_LOC.lat - uLat) * Math.PI/180;
        const dLon = (SCHOOL_LOC.lon - uLon) * Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(uLat*Math.PI/180)*Math.cos(SCHOOL_LOC.lat*Math.PI/180)*Math.sin(dLon/2)**2;
        const jarak = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        
        if (jarak > SCHOOL_LOC.radius) return alert(`Di luar jangkauan (${Math.round(jarak)}m)`);

        const cvs = document.getElementById('canvas'); cvs.width = 400; cvs.height = 400;
        const ctx = cvs.getContext('2d'); ctx.translate(400,0); ctx.scale(-1,1);
        ctx.drawImage(document.getElementById('video'), 0, 0, 400, 400);
        
        await _supabase.from('presensi').insert([{ 
            nama_guru: currentUser, tipe, foto: cvs.toDataURL('image/webp', 0.4), 
            latitude: uLat, longitude: uLon 
        }]);
        alert("Berhasil!"); location.reload();
    }, () => alert("GPS Error!"), { enableHighAccuracy: true });
}

async function loadHistory() {
    const { data } = await _supabase.from('presensi').select('*').eq('nama_guru', currentUser).order('created_at', {ascending: false}).limit(10);
    document.getElementById('login-history').innerHTML = data.map(h => `
        <div class="card-item d-flex justify-content-between align-items-center">
            <div><b>${h.tipe}</b><br><small class="text-muted">${new Date(h.created_at).toLocaleDateString()}</small></div>
            <div class="text-primary fw-bold">${new Date(h.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
        </div>
    `).join('') || '<p class="text-center small text-muted">Belum ada riwayat</p>';
}

async function loadAdminDashboard() {
    const tgl = new Date().toISOString().split('T')[0];
    const { data: gurus } = await _supabase.from('profil_guru').select('*');
    const { data: pres } = await _supabase.from('presensi').select('*').gte('created_at', tgl);

    document.getElementById('list-admin-view').innerHTML = gurus.map(g => {
        const pM = pres.find(x => x.nama_guru === g.username && (x.tipe === 'Masuk' || x.tipe === 'Izin'));
        const pP = pres.find(x => x.nama_guru === g.username && x.tipe === 'Pulang');
        return `
            <div class="card-item d-flex align-items-center gap-3">
                <img src="${g.foto_avatar || 'https://ui-avatars.com/api/?name='+g.username}" style="width:40px; height:40px; border-radius:10px;">
                <div class="flex-grow-1">
                    <div class="fw-bold" style="font-size:0.85rem">${g.nama_lengkap}</div>
                    <div class="small text-muted">M: ${pM ? new Date(pM.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--'} | P: ${pP ? new Date(pP.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '--'}</div>
                </div>
                <span class="badge ${pM ? 'bg-light text-success' : 'bg-light text-danger'}">${pM ? 'HADIR' : 'ABSEN'}</span>
            </div>`;
    }).join('');
}

function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
    .then(s => document.getElementById('video').srcObject = s).catch(e => console.error("Kamera Error"));
}

function logout() { localStorage.clear(); location.reload(); }
function takeIzin() {
    const al = prompt("Alasan:");
    if(al) _supabase.from('presensi').insert([{ nama_guru: currentUser, tipe: 'Izin', keterangan: al }]).then(() => location.reload());
}
async function saveSettings() {
    const val = document.getElementById('set-jam-pulang').value;
    await _supabase.from('pengaturan').update({ jam_pulang: val }).eq('id', 1);
    alert("Tersimpan!"); location.reload();
}
</script>
</body>
</html>
