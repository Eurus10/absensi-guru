<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>E-Presensi Guru v4.0</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
:root { --primary:#6366f1; --success:#22c55e; --danger:#ef4444; }

body{
margin:0;
height:100vh;
font-family:'Plus Jakarta Sans',sans-serif;
background:linear-gradient(-45deg,#6366f1,#a855f7,#ec4899);
background-size:400% 400%;
animation:gradientBG 15s ease infinite;
overflow:hidden;
}
@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.app-shell{
width:100%;
height:100vh;
background:rgba(255,255,255,0.96);
overflow-y:auto;
}

.school-banner{
padding:15px;
text-align:center;
background:white;
border-bottom:1px solid #eee;
}

#main-app{
display:flex;
flex-direction:column;
height:calc(100vh - 90px);
}

.camera-box{
width:220px;
height:220px;
border-radius:50%;
overflow:hidden;
margin:0 auto 20px;
background:#000;
border:5px solid white;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}
#video{
width:100%;
height:100%;
object-fit:cover;
transform:scaleX(-1);
}

.cool-btn{
border:none;
border-radius:20px;
padding:15px;
color:white;
font-weight:800;
transition:0.3s;
}
.btn-masuk{background:linear-gradient(135deg,#10b981,#059669);}
.btn-izin{background:linear-gradient(135deg,#f59e0b,#d97706);}
.btn-pulang{background:linear-gradient(135deg,#ef4444,#dc2626);}
.btn-disabled{background:#cbd5e1 !important;color:#64748b !important;opacity:0.6;cursor:not-allowed;}

.user-card{
background:white;
border-radius:18px;
padding:15px;
margin-bottom:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
border-left:5px solid #6366f1;
}
.user-card small{font-size:0.85rem}

#login-screen,#register-screen,#main-app,#admin-panel,#profile-page{
display:none;
padding:20px;
}
</style>
</head>
<body>

<div class="app-shell">

<div class="school-banner">
<img src="ChatGPTImageApr1202609_31_16PM.jpeg" style="width:45px;height:45px;border-radius:12px;">
<h6 class="fw-bold m-0 mt-2 text-primary small" id="school-name">SISTEM PRESENSI</h6>
</div>

<!-- MAIN APP -->
<div id="main-app">

<div class="mb-3">
<small class="text-muted">Halo,</small>
<h6 class="fw-bold m-0" id="user-display">-</h6>
</div>

<div class="text-center mb-2">
<h1 id="clock" class="fw-bold m-0" style="font-size:2.5rem;">00:00</h1>
<p id="date" class="text-muted small"></p>
</div>

<div class="camera-box">
<video id="video" autoplay playsinline></video>
</div>

<div class="row g-2">
<div class="col-6">
<button id="btn-masuk" class="cool-btn btn-masuk w-100" onclick="takeAbsen('Masuk')">MASUK</button>
</div>
<div class="col-6">
<button id="btn-izin" class="cool-btn btn-izin w-100" onclick="takeIzin()">IZIN</button>
</div>
</div>

<div class="mt-auto">
<button id="btn-pulang" class="cool-btn btn-pulang w-100 mt-3" onclick="takeAbsen('Pulang')">ABSEN PULANG</button>
<p id="lock-msg" class="text-center text-muted small mt-2"></p>
</div>

</div>

<!-- ADMIN PANEL -->
<div id="admin-panel">

<h6 class="fw-bold mb-3">MONITORING GURU</h6>

<div class="bg-light p-3 rounded-3 mb-3">
<label class="fw-bold small">BATAS JAM PULANG</label>
<div class="d-flex gap-2">
<input type="time" id="set-jam-mulai" class="form-control form-control-sm">
<input type="time" id="set-jam-selesai" class="form-control form-control-sm">
<button class="btn btn-primary btn-sm" onclick="updateJamPulang()">Simpan</button>
</div>
</div>

<div id="admin-stats" class="fw-bold small mb-3"></div>
<div id="list-admin-view"></div>

<button class="btn btn-danger w-100 mt-3" onclick="logout()">LOGOUT</button>

</div>

<!-- PROFILE -->
<div id="profile-page">

<h6 class="fw-bold mb-3">Profil Guru</h6>

<input type="text" id="edit-nama" class="form-control mb-2">
<input type="text" id="edit-jabatan" class="form-control mb-3">
<button class="btn btn-primary w-100 mb-3" onclick="updateProfile()">SIMPAN</button>

<div class="bg-light p-3 rounded-3 mb-3">
<h6 class="fw-bold small">RIWAYAT PRESENSI</h6>
<div id="history-presensi" style="max-height:150px;overflow:auto;font-size:0.8rem;"></div>
</div>

<button class="btn btn-secondary w-100" onclick="showScreen('main-app')">KEMBALI</button>

</div>

<!-- LOGIN -->
<div id="login-screen">
<h4 class="fw-bold text-center mb-4">Login</h4>
<input type="text" id="login-user" class="form-control mb-3" placeholder="Username">
<input type="password" id="login-pass" class="form-control mb-3" placeholder="Password">
<button class="btn btn-primary w-100" onclick="handleLogin()">LOGIN</button>
</div>

</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const SUPABASE_URL='https://dddbjqnoovjbdesvaulo.supabase.co';
const SUPABASE_KEY='YOUR_KEY';
const _supabase=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let currentUser="",userData=null;
let JAM_MULAI="14:00";
let JAM_SELESAI="17:00";

window.onload=()=>{
updateClock();
setInterval(updateClock,1000);
checkAutoLogin();
};

function showScreen(id){
['login-screen','main-app','admin-panel','profile-page'].forEach(s=>{
document.getElementById(s).style.display=(s===id)?'block':'none';
});
}

async function handleLogin(){
const u=document.getElementById('login-user').value;
const p=document.getElementById('login-pass').value;
const {data}=await _supabase.from('profil_guru').select('*').eq('username',u).eq('password',p).single();
if(data){
currentUser=data.username;
userData=data;
document.getElementById('user-display').innerText=data.nama_lengkap;
showScreen('main-app');
startCamera();
}else alert("Login gagal");
}

function updateClock(){
const n=new Date();
document.getElementById('clock').innerText=n.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
document.getElementById('date').innerText=n.toLocaleDateString('id-ID');
const nowStr=n.toTimeString().slice(0,5);
if(nowStr>=JAM_MULAI && nowStr<=JAM_SELESAI){
document.getElementById('btn-pulang').classList.remove('btn-disabled');
document.getElementById('lock-msg').innerText="";
}else{
document.getElementById('btn-pulang').classList.add('btn-disabled');
document.getElementById('lock-msg').innerText="Aktif: "+JAM_MULAI+" - "+JAM_SELESAI;
}
}

async function takeAbsen(tipe){
const now=new Date();
const nowStr=now.toTimeString().slice(0,5);
if(tipe==="Pulang" && (nowStr<JAM_MULAI || nowStr>JAM_SELESAI)){
alert("Diluar jam pulang");
return;
}
await _supabase.from('presensi').insert([{nama_guru:currentUser,tipe}]);
alert("Berhasil");
}

async function takeIzin(){
await _supabase.from('presensi').insert([{nama_guru:currentUser,tipe:"Izin"}]);
alert("Izin terkirim");
}

async function loadAdminDashboard(){
const {data:guru}=await _supabase.from('profil_guru').select('*');
document.getElementById('admin-stats').innerText="Total Guru: "+guru.length;
document.getElementById('list-admin-view').innerHTML=
guru.map(g=>`<div class="user-card"><b>${g.nama_lengkap}</b></div>`).join('');
}

async function updateJamPulang(){
JAM_MULAI=document.getElementById('set-jam-mulai').value;
JAM_SELESAI=document.getElementById('set-jam-selesai').value;
alert("Jam diperbarui");
}

async function updateProfile(){
await _supabase.from('profil_guru')
.update({nama_lengkap:document.getElementById('edit-nama').value})
.eq('username',currentUser);
alert("Updated");
}

async function loadHistory(){
const {data}=await _supabase.from('presensi')
.select('*')
.eq('nama_guru',currentUser)
.order('created_at',{ascending:false})
.limit(7);
document.getElementById('history-presensi').innerHTML=
data.map(d=>`<div>${d.tipe} - ${new Date(d.created_at).toLocaleDateString('id-ID')}</div>`).join('');
}

function startCamera(){
navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}})
.then(s=>document.getElementById('video').srcObject=s);
}

function logout(){
location.reload();
}
</script>

</body>
</html>
