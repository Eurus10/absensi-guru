<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Presensi Guru v2.9 - Photo Verify</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; }
        body { margin: 0; min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(-45deg, #6366f1, #a855f7, #ec4899); background-size: 400% 400%; animation: gradientBG 10s ease infinite; display: flex; align-items: center; justify-content: center; overscroll-behavior: none; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .app-shell { width: 100%; max-width: 430px; height: 92vh; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-radius: 35px; overflow-y: auto; position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .school-banner { padding: 20px; text-align: center; background: white; border-radius: 0 0 30px 30px; border-bottom: 2px solid #f0f0f0; }
        .school-logo { width: 60px; height: 60px; border-radius: 15px; object-fit: cover; margin-bottom: 5px; }
        
        .pass-group { position: relative; }
        .toggle-password { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #94a3b8; z-index: 10; }

        .camera-container { margin: 15px; border-radius: 25px; overflow: hidden; height: 220px; border: 4px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-action { border-radius: 20px; padding: 18px; font-weight: 800; border: none; color: white; margin-bottom: 12px; width: 100%; transition: 0.3s; }
        .btn-masuk { background: linear-gradient(135deg, #10b981, #059669); }
        .btn-pulang { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .btn-disabled { background: #cbd5e1 !important; color: #64748b !important; cursor: not-allowed; opacity: 0.8; }
        
        #login-screen, #register-screen, #main-app, #admin-panel, #profile-page { display: none; padding: 20px; }
        
        .admin-section-title { font-size: 0.85rem; font-weight: 800; text-transform: uppercase; color: #64748b; margin: 20px 0 10px 5px; display: flex; justify-content: space-between; }
        .user-card { background: white; border-radius: 15px; padding: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; border-left: 5px solid #eee; }
        .user-card.status-done { border-left-color: var(--success); }
        .user-card.status-none { border-left-color: var(--danger); }
        .user-avatar-mini { width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; object-fit: cover; background: #f0f0f0; }
        
        /* Modal Foto Admin */
        #photo-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; border-radius: 25px; width: 100%; max-width: 350px; text-align: center; padding: 15px; }
        .modal-img { width: 100%; border-radius: 15px; margin-bottom: 15px; }

        .profile-header { text-align: center; margin-bottom: 20px; }
        .profile-img-container { position: relative; display: inline-block; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn-edit-photo { position: absolute; bottom: 0; right: 0; background: var(--primary); color: white; border-radius: 50%; width: 30px; height: 30px; border: none; font-size: 12px; }
    </style>
</head>
<body>

<div id="photo-modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h6 class="fw-bold mb-3" id="modal-title">Foto Presensi</h6>
        <img id="modal-img-src" src="" class="modal-img">
        <button class="btn btn-dark w-100 rounded-pill" onclick="document.getElementById('photo-modal').style.display='none'">Tutup</button>
    </div>
</div>

<div class="app-shell">
    <div class="school-banner">
        <img id="logo-img" src="" class="school-logo">
        <h6 id="school-name" class="fw-bold m-0" style="color: var(--primary);">MEMUAT...</h6>
    </div>

    <div id="login-screen" class="text-center">
        <div class="mt-5 mb-4 text-primary"><i class="fas fa-fingerprint" style="font-size: 4rem;"></i></div>
        <h4 class="fw-bold mb-4">E-Presensi</h4>
        <input type="text" id="login-user" class="form-control mb-3 p-3 rounded-pill border-0 shadow-sm" placeholder="Username">
        <div class="pass-group mb-4">
            <input type="password" id="login-pass" class="form-control p-3 rounded-pill border-0 shadow-sm" placeholder="Password">
            <i class="fas fa-eye toggle-password" onclick="togglePass('login-pass', this)"></i>
        </div>
        <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold mb-3 shadow" onclick="handleLogin()">MASUK</button>
        <p class="small">Guru baru? <a href="javascript:void(0)" onclick="showScreen('register-screen')">Daftar Akun</a></p>
    </div>

    <div id="register-screen">
        <h4 class="fw-bold mb-4 text-center">Daftar Akun Guru</h4>
        <input type="text" id="reg-nama" class="form-control mb-3 p-3 rounded-4" placeholder="Nama Lengkap">
        <input type="text" id="reg-user" class="form-control mb-3 p-3 rounded-4" placeholder="Username Baru">
        <div class="pass-group mb-4">
            <input type="password" id="reg-pass" class="form-control p-3 rounded-4" placeholder="Password Baru">
            <i class="fas fa-eye toggle-password" onclick="togglePass('reg-pass', this)"></i>
        </div>
        <button class="btn btn-dark w-100 py-3 rounded-pill fw-bold mb-3" onclick="handleRegister()">BUAT AKUN</button>
        <button class="btn btn-link w-100 small text-muted" onclick="showScreen('login-screen')">Kembali</button>
    </div>

    <div id="main-app">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div><small class="text-muted">Guru:</small><h6 class="fw-bold m-0" id="user-display">-</h6></div>
            <img id="mini-avatar" src="" style="width:50px; height:50px; border-radius:50%; border:2px solid white; object-fit:cover; cursor:pointer" onclick="showProfile()">
        </div>
        <div class="camera-container"><video id="video" autoplay playsinline></video></div>
        <div class="text-center">
            <h2 id="clock" class="fw-bold mb-0">00:00</h2>
            <p id="date" class="text-muted small mb-3"></p>
            <button id="btn-masuk" class="btn-action btn-masuk shadow-lg" onclick="takeAbsen('Masuk')">ABSEN MASUK</button>
            <button id="btn-pulang" class="btn-action btn-pulang shadow-lg" onclick="takeAbsen('Pulang')">ABSEN PULANG</button>
            <p id="info-pulang" class="text-danger small fw-bold d-none">Absen pulang dibuka jam 14:00</p>
        </div>
    </div>

    <div id="admin-panel">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold m-0">Dashboard Admin</h5>
            <button class="btn btn-success btn-sm rounded-pill" onclick="exportData()">Excel</button>
        </div>
        <div class="admin-section-title"><span>Sudah Absen Hari Ini</span><span class="badge bg-success" id="count-done">0</span></div>
        <div id="list-sudah"></div>
        <div class="admin-section-title"><span>Belum Absen</span><span class="badge bg-danger" id="count-none">0</span></div>
        <div id="list-belum"></div>
        <button class="btn btn-link w-100 mt-4 text-danger" onclick="location.reload()">Keluar Admin</button>
    </div>

    <div id="profile-page">
        <button class="btn btn-light rounded-pill btn-sm mb-3" onclick="showScreen('main-app')"><i class="fas fa-arrow-left"></i> Kembali</button>
        <div class="profile-header">
            <div class="profile-img-container">
                <img id="p-img" src="" class="profile-img">
                <button class="btn-edit-photo" onclick="document.getElementById('input-foto').click()"><i class="fas fa-camera"></i></button>
                <input type="file" id="input-foto" style="display:none" accept="image/*" onchange="uploadFotoProfil(this)">
            </div>
            <h5 id="p-nama" class="fw-bold mt-2 mb-0">-</h5>
            <p id="p-username" class="text-muted small">@username</p>
        </div>
        <h6 class="fw-bold small mb-2">Riwayat Absen:</h6>
        <div id="history-list"></div>
        <button class="btn btn-outline-danger btn-sm w-100 mt-3" onclick="location.reload()">Logout Akun</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const SUPABASE_URL = 'https://dddbjqnoovjbdesvaulo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkZGJqcW5vb3ZqYmRlc3ZhdWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDAzMTUsImV4cCI6MjA5MDYxNjMxNX0.yLeBX4C8bwpCngvOViMR-eocHVFjv0BXXBuPJWwb9KU';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const SCHOOL_LAT = -6.250736361618612;
const SCHOOL_LON = 106.46656879999998;
const MAX_DISTANCE = 50; 

let currentUser = "";
let userData = null;

window.onload = () => { 
    updateClock(); setInterval(updateClock, 1000); 
    loadSchoolData(); 
    showScreen('login-screen'); 
};

function togglePass(id, icon) {
    const input = document.getElementById(id);
    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = "password";
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}

function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('date').innerText = now.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long'});
    if (now.getHours() < 14) document.getElementById('info-pulang').classList.remove('d-none');
    else document.getElementById('info-pulang').classList.add('d-none');
}

function showScreen(id) {
    ['login-screen', 'register-screen', 'main-app', 'admin-panel', 'profile-page'].forEach(s => {
        document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
    });
}

// FUNGSI ADMIN: LIHAT FOTO
function viewPhoto(imgData, title) {
    document.getElementById('modal-img-src').src = imgData;
    document.getElementById('modal-title').innerText = "Foto " + title;
    document.getElementById('photo-modal').style.display = 'flex';
}

async function handleRegister() {
    const nama = document.getElementById('reg-nama').value;
    const user = document.getElementById('reg-user').value;
    const pass = document.getElementById('reg-pass').value;
    if(!nama || !user || !pass) return alert("Lengkapi data!");
    const { error } = await _supabase.from('profil_guru').insert([{ username: user, password: pass, nama_lengkap: nama }]);
    if(!error) { alert("Berhasil! Silahkan Login."); showScreen('login-screen'); }
    else alert("Username sudah ada!");
}

async function handleLogin() {
    const u = document.getElementById('login-user').value;
    const p = document.getElementById('login-pass').value;
    if(u === "admin" && p === "admin123") { showScreen('admin-panel'); loadAdminDashboard(); return; }
    const { data } = await _supabase.from('profil_guru').select('*').eq('username', u).eq('password', p).single();
    if(data) {
        currentUser = u; userData = data;
        document.getElementById('user-display').innerText = data.nama_lengkap;
        document.getElementById('mini-avatar').src = data.foto_avatar || `https://ui-avatars.com/api/?name=${data.nama_lengkap}&background=6366f1&color=fff`;
        showScreen('main-app'); startCamera(); checkTodayPresence();
    } else alert("Gagal Login!");
}

async function checkTodayPresence() {
    const today = new Date().toISOString().split('T')[0];
    const { data } = await _supabase.from('presensi').select('tipe').eq('nama_guru', currentUser).gte('created_at', today);
    const hasMasuk = data.some(d => d.tipe === 'Masuk');
    const hasPulang = data.some(d => d.tipe === 'Pulang');
    if(hasMasuk) { let bm = document.getElementById('btn-masuk'); bm.classList.add('btn-disabled'); bm.onclick = null; bm.innerText = "SUDAH ABSEN MASUK"; }
    if(hasPulang) { let bp = document.getElementById('btn-pulang'); bp.classList.add('btn-disabled'); bp.onclick = null; bp.innerText = "SUDAH ABSEN PULANG"; }
}

async function takeAbsen(tipe) {
    const now = new Date();
    if(tipe === 'Pulang' && now.getHours() < 14) return alert("Belum jam 14:00!");
    navigator.geolocation.getCurrentPosition(async (pos) => {
        const userLat = pos.coords.latitude; const userLon = pos.coords.longitude;
        const R = 6371e3;
        const dLat = (SCHOOL_LAT - userLat) * Math.PI/180;
        const dLon = (SCHOOL_LON - userLon) * Math.PI/180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(userLat*Math.PI/180) * Math.cos(SCHOOL_LAT*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const jarak = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        if (jarak > MAX_DISTANCE) return alert(`Terlalu Jauh (${Math.round(jarak)}m)`);
        
        const canvas = document.getElementById('canvas');
        canvas.width = 400; canvas.height = 400;
        canvas.getContext('2d').drawImage(document.getElementById('video'), 0, 0, 400, 400);
        
        const imgData = canvas.toDataURL('image/webp', 0.5);
        const status = (tipe === 'Masuk' && (now.getHours() > 7 || (now.getHours() === 7 && now.getMinutes() > 0))) ? "Terlambat" : "Tepat Waktu";
        
        await _supabase.from('presensi').insert([{ 
            nama_guru: currentUser, 
            tipe: tipe, 
            keterangan: status, 
            foto: imgData, 
            latitude: userLat, 
            longitude: userLon 
        }]);
        
        alert("Absen Berhasil!"); checkTodayPresence();
    }, (err) => alert("GPS Error"), { enableHighAccuracy: true });
}

async function loadAdminDashboard() {
    const today = new Date().toISOString().split('T')[0];
    const { data: allGurus } = await _supabase.from('profil_guru').select('*').order('nama_lengkap');
    const { data: todayPresensi } = await _supabase.from('presensi').select('*').gte('created_at', today);
    const sudahUsernames = [...new Set(todayPresensi.map(p => p.nama_guru))];
    const gurusDone = allGurus.filter(g => sudahUsernames.includes(g.username));
    const gurusNone = allGurus.filter(g => !sudahUsernames.includes(g.username));
    
    document.getElementById('count-done').innerText = gurusDone.length;
    document.getElementById('count-none').innerText = gurusNone.length;
    
    document.getElementById('list-sudah').innerHTML = gurusDone.map(g => {
        const pres = todayPresensi.filter(p => p.nama_guru === g.username);
        const hasMasuk = pres.find(p => p.tipe === 'Masuk');
        const hasPulang = pres.find(p => p.tipe === 'Pulang');
        
        return `
            <div class="user-card status-done">
                <img src="${g.foto_avatar || 'https://ui-avatars.com/api/?name='+g.nama_lengkap}" class="user-avatar-mini">
                <div style="flex:1">
                    <div class="fw-bold small">${g.nama_lengkap}</div>
                    <div class="text-muted" style="font-size:10px">
                        ${hasMasuk ? `<span class="text-success" onclick="viewPhoto('${hasMasuk.foto}', 'Masuk ${g.nama_lengkap}')" style="cursor:pointer"><i class="fas fa-camera"></i> M: ${new Date(hasMasuk.created_at).toLocaleTimeString()}</span>` : 'M: -'} | 
                        ${hasPulang ? `<span class="text-danger" onclick="viewPhoto('${hasPulang.foto}', 'Pulang ${g.nama_lengkap}')" style="cursor:pointer"><i class="fas fa-camera"></i> P: ${new Date(hasPulang.created_at).toLocaleTimeString()}</span>` : 'P: -'}
                    </div>
                </div>
                <i class="fas fa-check-circle text-success"></i>
            </div>`;
    }).join('');

    document.getElementById('list-belum').innerHTML = gurusNone.map(g => `
        <div class="user-card status-none">
            <img src="${g.foto_avatar || 'https://ui-avatars.com/api/?name='+g.nama_lengkap}" class="user-avatar-mini">
            <div style="flex:1">
                <div class="fw-bold small">${g.nama_lengkap}</div>
                <div class="text-danger" style="font-size:10px">Belum ada keterangan</div>
            </div>
            <i class="fas fa-times-circle text-danger"></i>
        </div>`).join('');
}

async function uploadFotoProfil(input) {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = async (e) => {
        const base64 = e.target.result;
        const { error } = await _supabase.from('profil_guru').update({ foto_avatar: base64 }).eq('username', currentUser);
        if(!error) { document.getElementById('p-img').src = base64; document.getElementById('mini-avatar').src = base64; alert("Berhasil!"); }
    };
    reader.readAsDataURL(file);
}

async function showProfile() {
    showScreen('profile-page');
    document.getElementById('p-nama').innerText = userData.nama_lengkap;
    document.getElementById('p-username').innerText = "@" + userData.username;
    document.getElementById('p-img').src = userData.foto_avatar || `https://ui-avatars.com/api/?name=${userData.nama_lengkap}`;
    const { data: hist } = await _supabase.from('presensi').select('*').eq('nama_guru', currentUser).order('created_at', {ascending:false}).limit(10);
    document.getElementById('history-list').innerHTML = hist.map(h => `<div class="history-card shadow-sm p-2 mb-2 bg-white rounded-3 small" style="border-left: 4px solid ${h.keterangan === 'Terlambat' ? 'red' : 'green'}"><b>${h.tipe}</b> - ${h.keterangan} <br> <span class="text-muted" style="font-size:10px">${new Date(h.created_at).toLocaleString()}</span></div>`).join('');
}

async function exportData() {
    const { data } = await _supabase.from('presensi').select('*').order('created_at', {ascending: true});
    const grouped = {};
    data.forEach(item => {
        const tgl = new Date(item.created_at).toLocaleDateString('id-ID');
        const key = `${item.nama_guru}_${tgl}`;
        if(!grouped[key]) grouped[key] = { 'Nama Guru': item.nama_guru, 'Tanggal': tgl, 'Jam Masuk': '-', 'Status Masuk': '-', 'Jam Pulang': '-', 'Status Pulang': '-' };
        if(item.tipe === 'Masuk') { grouped[key]['Jam Masuk'] = new Date(item.created_at).toLocaleTimeString('id-ID'); grouped[key]['Status Masuk'] = item.keterangan; }
        else { grouped[key]['Jam Pulang'] = new Date(item.created_at).toLocaleTimeString('id-ID'); grouped[key]['Status Pulang'] = item.keterangan; }
    });
    const ws = XLSX.utils.json_to_sheet(Object.values(grouped));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Rekap");
    XLSX.writeFile(wb, `Rekap_Presensi.xlsx`);
}

async function loadSchoolData() {
    const { data } = await _supabase.from('pengaturan').select('*').eq('id', 1).single();
    if(data) { document.getElementById('logo-img').src = data.logo_url; document.getElementById('school-name').innerText = data.nama_sekolah; }
}

function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => document.getElementById('video').srcObject = s);
}
</script>
</body>
</html>
